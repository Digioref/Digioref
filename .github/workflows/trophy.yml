name: Generate trophy

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Generate the file in the ROOT directory (easier for the action)
      - name: Generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          output_path: trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Create the folder and move the file into it
      - name: Move file to Trophy folder
        run: |
          mkdir -p Trophy
          mv trophy.svg Trophy/trophy.svg

      # Step 4: Commit the file from its new location
      - name: Commit and Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Trophy/trophy.svg
          git commit -m "Update trophy.svg" || echo "No changes to commit"
          git push
